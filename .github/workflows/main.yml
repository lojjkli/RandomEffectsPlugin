name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Bukkit API
        run: curl -L "https://repo.maven.apache.org/maven2/org/bukkit/bukkit/1.21.1-R0.1-SNAPSHOT/bukkit-1.21.1-R0.1-SNAPSHOT.jar" -o spigot-api.jar

      - name: Check jar
        run: ls -lh spigot-api.jar && file spigot-api.jar

      - name: Compile
        run: mkdir -p classes && javac -cp spigot-api.jar -d classes RandomEffectsPlugin.java

      - name: Package Jar
        run: |
          mkdir -p jartemp
          cp -r classes/* jartemp/
          cp plugin.yml jartemp/
          cd jartemp
          jar cf ../RandomEffectsPlugin.jar .

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: RandomEffectsPlugin
          path: RandomEffectsPlugin.jar
