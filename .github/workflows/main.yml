name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Spigot API
        run: curl -L "https://repo.papermc.io/repository/maven-public/org/spigotmc/spigot-api/1.21.4-R0.1-SNAPSHOT/spigot-api-1.21.4-R0.1-SNAPSHOT-shaded.jar" -o spigot-api.jar

      - name: Compile
        run: mkdir -p classes && javac -cp spigot-api.jar -d classes RandomEffectsPlugin.java

      - name: Package Jar
        run: |
          mkdir -p jartemp
          cp -r classes/* jartemp/
          cp plugin.yml jartemp/
          cd jartemp
          jar cf ../RandomEffectsPlugin.jar .

      - name: Upload Jar
        uses: actions/upload-artifact@v3
        with:
          name: RandomEffectsPlugin
          path: RandomEffectsPlugin.jar
